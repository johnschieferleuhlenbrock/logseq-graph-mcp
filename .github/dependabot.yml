version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    groups:
      npm-runtime:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
