name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish without publishing
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run sbom
      - run: npm publish --access public --dry-run

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm trusted publishing provenance.
      # zizmor: ignore[excessive-permissions]
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run sbom
      - name: Publish to npm
        run: npm publish --access public --provenance
